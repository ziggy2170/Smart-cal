<style>
/* ═══════════════════════════════════════════════
   FLO — PROFESSIONAL DESIGN SYSTEM
   Kill Syne on numbers. Clean, consistent, pro.
   ═══════════════════════════════════════════════ */

/* Load clean professional fonts */
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;0,600&family=Syne:wght@700;800&display=swap');

:root {
  --flo-body: 'DM Sans', system-ui, sans-serif;
  --flo-display: 'DM Sans', system-ui, sans-serif;
  --flo-mono: 'DM Mono', 'JetBrains Mono', monospace;
}

/* ── BASE ── */
html, body, #root, * {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

html, body, #root {
  font-family: var(--flo-body) !important;
}

/* ── KILL SYNE ON EVERYTHING EXCEPT .section-title ── */
/* Syne looks terrible on numbers - replace with DM Sans everywhere */
[style*="'Syne'"],
[style*="Syne,sans-serif"],
[style*="fontFamily:\"'Syne'"],
[style*="font-family: 'Syne'"] {
  font-family: var(--flo-body) !important;
  letter-spacing: -0.025em !important;
  font-weight: 800 !important;
}

/* But keep Syne ONLY on the section heading h1 */
.section-title {
  font-family: 'Syne', sans-serif !important;
  font-size: 26px !important;
  font-weight: 800 !important;
  letter-spacing: -0.02em !important;
  line-height: 1.1 !important;
  color: var(--text) !important;
}

/* ── ALL NUMBERS — clean, tabular, professional ── */
[style*="JetBrains Mono"],
[style*="'JetBrains Mono'"],
[style*="monospace"] {
  font-family: var(--flo-mono) !important;
  font-feature-settings: 'tnum' 1, 'kern' 1 !important;
  letter-spacing: -0.02em !important;
}

/* ── BODY TEXT ── */
p, span, div, button, label, input, select, textarea, a {
  font-family: var(--flo-body) !important;
}

/* ── NAV ITEMS ── */
.nav-item {
  font-family: var(--flo-body) !important;
  font-size: 13px !important;
  font-weight: 600 !important;
  border-radius: 10px !important;
  letter-spacing: -0.01em !important;
}

/* ── CARDS ── */
.card, .card-elevated, .card-glass {
  border-radius: 16px !important;
}

/* ── STAT CARDS ── */
.stat-card {
  border-radius: 16px !important;
  padding: 18px 20px !important;
  position: relative !important;
  overflow: hidden !important;
  transition: transform 0.15s ease, box-shadow 0.15s ease !important;
}
.stat-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  pointer-events: none;
}
.stat-card:hover {
  transform: translateY(-2px) !important;
  box-shadow: 0 8px 28px rgba(0,0,0,0.45) !important;
}

/* ── PILLS ── */
.pill {
  font-family: var(--flo-body) !important;
  font-size: 11px !important;
  font-weight: 600 !important;
  border-radius: 6px !important;
  padding: 2px 8px !important;
  letter-spacing: 0 !important;
}

/* ── BUTTONS ── */
.btn {
  font-family: var(--flo-body) !important;
  font-weight: 600 !important;
  border-radius: 10px !important;
  letter-spacing: -0.01em !important;
}
.btn-primary {
  background: linear-gradient(135deg, #00ffa3, #00d4ff) !important;
  color: #000 !important;
  font-weight: 700 !important;
  box-shadow: 0 2px 12px rgba(0,255,163,0.2) !important;
}

/* ── FIELDS ── */
.field {
  font-family: var(--flo-body) !important;
  border-radius: 10px !important;
  font-size: 14px !important;
  letter-spacing: -0.01em !important;
}

/* ── LABEL ── */
.label {
  font-family: var(--flo-body) !important;
  font-size: 10px !important;
  font-weight: 700 !important;
  letter-spacing: 0.08em !important;
  text-transform: uppercase !important;
}

/* ── PROGRESS BARS ── */
.progress-bar, .progress-fill { border-radius: 4px !important; }

/* ── MODAL ── */
.modal-box { border-radius: 22px !important; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 99px; }

/* ── SELECTION ── */
::selection { background: rgba(0,255,163,0.15); }

/* ── FOCUS ── */
button:focus-visible, input:focus-visible, select:focus-visible {
  outline: 1.5px solid rgba(0,255,163,0.45) !important;
  outline-offset: 2px !important;
}

/* ── FIX: desktop calendar panel ── */
@media (min-width: 1024px) {
  .hidden.lg\:block { display: block !important; }
}

/* ─────────────────────────────────────────
   BOTTOM NAV
   ───────────────────────────────────────── */
#flo-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 9999;
  display: flex;
  align-items: flex-start;
  padding: 10px 4px 0;
  padding-bottom: env(safe-area-inset-bottom, 14px);
  background: rgba(10,11,15,0.98);
  border-top: 1px solid rgba(255,255,255,0.05);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
}
#flo-nav .fn-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 4px 2px 8px;
  border: none;
  background: none;
  cursor: pointer;
  color: rgba(255,255,255,0.2);
  font-family: var(--flo-body);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  transition: color 0.15s ease;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
#flo-nav .fn-btn:active { transform: scale(0.86); transition: transform 0.08s; }
#flo-nav .fn-btn .fn-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: #00ffa3;
  box-shadow: 0 0 5px #00ffa3;
  opacity: 0;
  transition: opacity 0.15s ease;
  position: absolute;
  top: 0;
}
#flo-nav .fn-btn.active { color: #00ffa3; }
#flo-nav .fn-btn.active .fn-dot { opacity: 1; }
#flo-nav .fn-icon {
  font-size: 19px;
  line-height: 1;
  display: block;
  transition: transform 0.15s ease;
}
#flo-nav .fn-btn.active .fn-icon { transform: translateY(-1px); }

/* ─────────────────────────────────────────
   TOP BAR
   ───────────────────────────────────────── */
#flo-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 9998;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: rgba(10,11,15,0.96);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}
#flo-bar .fb-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
#flo-bar .fb-gem {
  width: 24px; height: 24px;
  border-radius: 7px;
  background: linear-gradient(135deg, #00ffa3, #00d4ff);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}
#flo-bar .fb-section {
  font-family: var(--flo-body);
  font-size: 14px;
  font-weight: 700;
  color: #f0f1f5;
  letter-spacing: -0.02em;
}
#flo-bar .fb-pill {
  font-family: var(--flo-mono);
  font-size: 11px;
  font-weight: 500;
  color: #00ffa3;
  background: rgba(0,255,163,0.08);
  border: 1px solid rgba(0,255,163,0.14);
  border-radius: 8px;
  padding: 3px 10px;
  letter-spacing: -0.01em;
  font-feature-settings: 'tnum' 1;
}
</style>

<script>
(function(){
  var TABS = [
    { id:'todos',       icon:'2705',    label:'Tasks'    },
    { id:'analytics',   icon:'1F4CA',   label:'Stats'    },
    { id:'calendar',    icon:'1F4C5',   label:'Calendar' },
    { id:'goals',       icon:'1F3AF',   label:'Goals'    },
    { id:'projections', icon:'1F680',   label:'Project'  },
    { id:'people',      icon:'1F465',   label:'People'   },
    { id:'settings',    icon:'2699',    label:'Settings' }
  ];

  var NAMES = { todos:'Tasks', analytics:'Analytics', calendar:'Calendar', goals:'Goals', projections:'Projections', people:'People', settings:'Settings' };
  var active = 'todos';

  function icon(cp) {
    return cp.split('-').map(function(c){ return String.fromCodePoint(parseInt(c,16)); }).join('');
  }
  function loadState() {
    try { return JSON.parse(localStorage.getItem('smartmoney-v2') || '{}'); } catch(e) { return {}; }
  }
  function fmt(n) {
    return new Intl.NumberFormat('en-AU',{style:'currency',currency:'AUD',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
  }
  function getNet() {
    var s = loadState();
    var freq = function(arr) {
      return (arr||[]).reduce(function(a,x){
        return x.frequency==='weekly' ? a+x.amount*4.33
             : x.frequency==='fortnightly' ? a+x.amount*2.17
             : x.frequency==='monthly' ? a+x.amount : a;
      }, 0);
    };
    return freq(s.incomes) - freq(s.expenses);
  }
  function clickSection(id) {
    var label = NAMES[id];
    var all = document.querySelectorAll('button');
    for (var i = 0; i < all.length; i++) {
      if (all[i].classList.contains('nav-item') && all[i].textContent.indexOf(label) >= 0) { all[i].click(); return; }
    }
    for (var i = 0; i < all.length; i++) {
      if (all[i].textContent.trim() === label) { all[i].click(); return; }
    }
  }
  function setActive(id) {
    active = id;
    document.querySelectorAll('#flo-nav .fn-btn').forEach(function(b){
      b.classList.toggle('active', b.dataset.id === id);
    });
    var sec = document.getElementById('flo-section-name');
    if (sec) sec.textContent = NAMES[id] || id;
  }
  function detectFromDOM() {
    var h = document.querySelector('h1.section-title');
    if (!h) return;
    var inv = { Calendar:'calendar', Goals:'goals', Tasks:'todos', Analytics:'analytics', Projections:'projections', People:'people', Settings:'settings' };
    var found = inv[h.textContent.trim()];
    if (found && found !== active) setActive(found);
  }
  function updatePill() {
    var el = document.getElementById('flo-pill');
    if (!el) return;
    var n = getNet();
    el.textContent = (n >= 0 ? '+' : '') + fmt(n) + '/mo';
    el.style.color = n >= 0 ? '#00ffa3' : '#ff5c5c';
    el.style.borderColor = n >= 0 ? 'rgba(0,255,163,0.14)' : 'rgba(255,92,92,0.18)';
    el.style.background = n >= 0 ? 'rgba(0,255,163,0.08)' : 'rgba(255,92,92,0.09)';
  }
  function isCalendarPanel(el) {
    var s = el.getAttribute('style') || '';
    var zMatch = s.match(/z-index\s*:\s*(\d+)/);
    if (zMatch && parseInt(zMatch[1]) >= 50) return true;
    if (s.indexOf('inset:') >= 0 || s.indexOf('inset: ') >= 0) return true;
    if (s.indexOf('justify-content: flex-end') >= 0) return true;
    return false;
  }
  function sweep() {
    document.querySelectorAll('div').forEach(function(d){
      var c = d.className || '';
      if (c.indexOf('lg:flex') >= 0 && c.indexOf('lg:flex-shrink-0') >= 0)
        d.style.setProperty('display','none','important');
    });
    document.querySelectorAll('div').forEach(function(d){
      var s = d.getAttribute('style') || '';
      if ((s.indexOf('bottom:0') >= 0 || s.indexOf('bottom: 0') >= 0) && s.indexOf('position') >= 0) {
        if (!isCalendarPanel(d) && d.querySelectorAll('button').length >= 4)
          d.style.setProperty('display','none','important');
      }
    });
    document.querySelectorAll('div').forEach(function(d){
      var c = d.className || '', s = d.getAttribute('style') || '';
      if (c.indexOf('lg:hidden') >= 0 && d.querySelector('svg')
          && s.indexOf('bottom') < 0 && s.indexOf('position: fixed') < 0
          && s.indexOf('position:fixed') < 0 && s.indexOf('inset') < 0
          && (s.indexOf('flex') >= 0 || s.indexOf('align') >= 0 || s.indexOf('border') >= 0)) {
        d.style.setProperty('display','none','important');
      }
    });
    var m = document.querySelector('main');
    if (m && !m.dataset.fp) { m.dataset.fp = '1'; m.style.paddingTop = '48px'; m.style.paddingBottom = '80px'; }
  }
  function build() {
    if (document.getElementById('flo-nav')) return;
    var nav = document.createElement('div');
    nav.id = 'flo-nav';
    nav.innerHTML = TABS.map(function(t){
      return '<button class="fn-btn' + (t.id === active ? ' active' : '') + '" data-id="' + t.id + '">'
        + '<span class="fn-dot"></span><span class="fn-icon">' + icon(t.icon) + '</span>' + t.label + '</button>';
    }).join('');
    nav.querySelectorAll('.fn-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        setActive(btn.dataset.id);
        clickSection(btn.dataset.id);
        setTimeout(updatePill, 400);
      });
    });
    document.body.appendChild(nav);
    var bar = document.createElement('div');
    bar.id = 'flo-bar';
    bar.innerHTML = '<div class="fb-left"><div class="fb-gem">&#x1F48E;</div>'
      + '<span class="fb-section" id="flo-section-name">Tasks</span></div>'
      + '<div class="fb-pill" id="flo-pill">...</div>';
    document.body.appendChild(bar);
    updatePill();
  }
  function init() {
    var r = document.getElementById('root');
    if (!r || !r.firstChild) { setTimeout(init, 120); return; }
    build();
    setTimeout(function(){ clickSection('todos'); setTimeout(detectFromDOM, 400); }, 500);
    var obs = new MutationObserver(function(){ detectFromDOM(); sweep(); });
    obs.observe(r, { childList: true, subtree: true });
    setInterval(function(){ sweep(); updatePill(); }, 2000);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(init, 200); });
  } else {
    setTimeout(init, 200);
  }
})();
</script>
